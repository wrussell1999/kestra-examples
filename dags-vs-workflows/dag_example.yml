id: dag_example
namespace: company.team

tasks:
  - id: main_dag
    type: io.kestra.plugin.core.flow.Dag
    tasks:
      - task:
          id: task1
          type: io.kestra.plugin.core.log.Log
          message: This is task 1
      - task:
          id: task2
          type: io.kestra.plugin.core.log.Log
          message: This is task 2 and will run after task 1
        dependsOn:
          - task1
      - task:
          id: task3
          type: io.kestra.plugin.core.log.Log
          message: This is task 3 and will run after task 1
        dependsOn:
          - task1
      - task:
          id: task4
          type: io.kestra.plugin.core.log.Log
          message: This is task 4 and will run after task 2 and 3
        dependsOn:
          - task2
          - task3
